<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>I Academy System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
   <link rel="stylesheet" href="style/index.css">
  </head>
  <body
    class="bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 min-h-screen"
  >
    <div id="toastContainer"></div>
    <input
      type="file"
      id="loadFile"
      accept=".json"
      class="hidden"
      onchange="loadAllData()"
    />

    <div id="mainContainer" class="container mx-auto px-4 py-8 max-w-7xl"></div>

    <div
      id="createCycleModal"
      class="hidden fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4"
    >
      <div
        class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 transform transition-all"
      >
        <h3 class="text-2xl font-bold text-gray-800 mb-6">Create New Cycle</h3>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2"
              >Cycle Name:</label
            >
            <input
              type="text"
              id="cycleName"
              placeholder="e.g., FO6, FO7, Spring 2024"
              class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:ring-4 focus:ring-indigo-200 focus:border-indigo-500"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2"
              >Number of Weeks:</label
            >
            <input
              type="number"
              id="cycleWeeks"
              value="20"
              min="1"
              max="52"
              class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:ring-4 focus:ring-indigo-200 focus:border-indigo-500"
            />
          </div>
        </div>
        <div class="flex gap-3 mt-6">
          <button
            onclick="createCycle()"
            class="flex-1 px-6 py-3 bg-green-500 hover:bg-green-600 text-white rounded-xl font-semibold shadow-lg transition-all"
          >
            Create
          </button>
          <button
            onclick="closeCreateCycleModal()"
            class="flex-1 px-6 py-3 bg-gray-300 hover:bg-gray-400 text-gray-800 rounded-xl font-semibold transition-all"
          >
            Cancel
          </button>
        </div>
      </div>
    </div>

    <div
      id="editCycleModal"
      class="hidden fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4"
    >
      <div
        class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 transform transition-all"
      >
        <h3 class="text-2xl font-bold text-gray-800 mb-6">Edit Cycle</h3>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2"
              >Cycle Name:</label
            >
            <input
              type="text"
              id="editCycleName"
              class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:ring-4 focus:ring-indigo-200 focus:border-indigo-500"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2"
              >Number of Weeks:</label
            >
            <input
              type="number"
              id="editCycleWeeks"
              min="1"
              max="52"
              class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:ring-4 focus:ring-indigo-200 focus:border-indigo-500"
            />
          </div>
        </div>
        <div class="flex gap-3 mt-6">
          <button
            onclick="saveEditCycle()"
            class="flex-1 px-6 py-3 bg-indigo-500 hover:bg-indigo-600 text-white rounded-xl font-semibold shadow-lg transition-all"
          >
            Save Changes
          </button>
          <button
            onclick="closeEditCycleModal()"
            class="flex-1 px-6 py-3 bg-gray-300 hover:bg-gray-400 text-gray-800 rounded-xl font-semibold transition-all"
          >
            Cancel
          </button>
        </div>
      </div>
    </div>

    <div
      id="addStudentModal"
      class="hidden fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4"
    >
      <div
        class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full p-8 max-h-[90vh] overflow-y-auto transform transition-all"
      >
        <h3 class="text-2xl font-bold text-gray-800 mb-6">Add New Student</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-gray-700 mb-2"
              >Student Name: <span class="text-red-500">*</span></label
            >
            <input
              type="text"
              id="newStudentName"
              placeholder="Enter student name"
              class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:ring-4 focus:ring-indigo-200 focus:border-indigo-500"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2"
              >Email:</label
            >
            <input
              type="email"
              id="newStudentEmail"
              placeholder="student@example.com"
              class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:ring-4 focus:ring-indigo-200 focus:border-indigo-500"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2"
              >Phone Number:</label
            >
            <input
              type="tel"
              id="newStudentPhone"
              placeholder="+1234567890"
              class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:ring-4 focus:ring-indigo-200 focus:border-indigo-500"
            />
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-gray-700 mb-2"
              >GitHub Link:</label
            >
            <input
              type="url"
              id="newStudentGithub"
              placeholder="https://github.com/username"
              class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:ring-4 focus:ring-indigo-200 focus:border-indigo-500"
            />
          </div>
        </div>
        <div class="flex gap-3 mt-6">
          <button
            onclick="confirmAddStudent()"
            class="flex-1 px-6 py-3 bg-green-500 hover:bg-green-600 text-white rounded-xl font-semibold shadow-lg transition-all"
          >
            Add Student
          </button>
          <button
            onclick="closeAddStudentModal()"
            class="flex-1 px-6 py-3 bg-gray-300 hover:bg-gray-400 text-gray-800 rounded-xl font-semibold transition-all"
          >
            Cancel
          </button>
        </div>
      </div>
    </div>

    <div
      id="reviewModal"
      class="hidden fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4"
    >
      <div
        class="bg-white rounded-2xl shadow-2xl max-w-4xl w-full p-8 max-h-[90vh] overflow-y-auto transform transition-all"
      >
        <h3 class="text-2xl font-bold text-gray-800 mb-6">
          Student Review & Grades
        </h3>
        <div id="reviewContent"></div>
        <div class="flex gap-3 mt-6">
          <button
            onclick="saveReview()"
            class="flex-1 px-6 py-3 bg-indigo-500 hover:bg-indigo-600 text-white rounded-xl font-semibold shadow-lg transition-all"
          >
            Save Review
          </button>
          <button
            onclick="exportStudentReport()"
            class="flex-1 px-6 py-3 bg-rose-500 hover:bg-rose-600 text-white rounded-xl font-semibold shadow-lg transition-all"
          >
            Export Report
          </button>
          <button
            onclick="closeReviewModal()"
            class="flex-1 px-6 py-3 bg-gray-300 hover:bg-gray-400 text-gray-800 rounded-xl font-semibold transition-all"
          >
            Close
          </button>
        </div>
      </div>
    </div>

   <script src="js/code.js"></script>
  </body>
</html>
